name: Generate figures

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: uv sync

      - name: Generate combined availability figure
        run: uv run python plot_combined_availability.py

      - name: Generate BedMap Antarctica survey density
        run: uv run python plot_survey_density.py --source bedmap --region antarctica

      - name: Generate xOPR Greenland survey density
        run: uv run python plot_survey_density.py --source xopr --region greenland

      - name: Generate BedMap ASE zoom
        run: uv run python plot_survey_density.py --source bedmap --region antarctica --zoom ase

      - name: Build site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp outputs/*.png _site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
