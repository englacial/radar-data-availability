name: Generate figures

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: uv sync

      - name: Generate combined availability figure
        run: uv run python plot_combined_availability.py

      - name: Generate BedMap Antarctica survey density
        run: uv run python plot_survey_density.py --source bedmap --region antarctica

      - name: Generate xOPR Greenland survey density
        run: uv run python plot_survey_density.py --source xopr --region greenland

      - name: Build site
        run: |
          mkdir -p _site
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Radar Data Availability Figures</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
              h1 { border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
              figure { margin: 2rem 0; }
              img { max-width: 100%; height: auto; border: 1px solid #eee; }
              figcaption { color: #555; margin-top: 0.5rem; }
            </style>
          </head>
          <body>
            <h1>Radar Data Availability Figures</h1>
            <figure>
              <img src="combined_data_availability.png" alt="Combined data availability">
              <figcaption>Combined BedMap + xOPR data availability by year</figcaption>
            </figure>
            <figure>
              <img src="survey_density_bedmap_antarctica.png" alt="BedMap Antarctica survey density">
              <figcaption>Survey density from BedMap (Antarctica)</figcaption>
            </figure>
            <figure>
              <img src="survey_density_xopr_greenland.png" alt="xOPR Greenland survey density">
              <figcaption>Survey density from xOPR (Greenland)</figcaption>
            </figure>
          </body>
          </html>
          HTMLEOF
          cp outputs/combined_data_availability.png _site/
          cp outputs/survey_density_bedmap_antarctica.png _site/
          cp outputs/survey_density_xopr_greenland.png _site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
